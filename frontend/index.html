<!DOCTYPE html>
<html>
<head>
    <title>Air Cargo Tracking Portal</title>
</head>
<body>

<h1>Air Cargo Consignment Milestone Tracking Portal</h1>

<form>
    <input type="text" placeholder="Shipment ID"><br><br>

    <input type="text" placeholder="Customer Name"><br><br>

    <input type="text" placeholder="Origin Airport"><br><br>

    <input type="text" placeholder="Destination Airport"><br><br>

    <input type="text" placeholder="Cargo Type"><br><br>

    <input type="number" placeholder="Package Count"><br><br>

    <input type="number" placeholder="Weight"><br><br>

    <select>
        <option>Booking Confirmed</option>
        <option>Documentation Complete</option>
        <option>Cargo Accepted</option>
        <option>Departed</option>
        <option>Transited</option>
        <option>Arrived</option>
        <option>Customs Cleared</option>
        <option>Delivered</option>
    </select>

    <br><br>

    <button type="submit">Submit</button>
</form>

</body>
</html>
